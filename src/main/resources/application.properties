# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration (Aiven MySQL)
# ------------- Action Required -------------
# Replace clicking CLICK_TO_REVEAL_PASSWORD in Aiven to get your password
# Replace <YOUR_PASSWORD_HERE> with the revealed password below:
spring.datasource.url=jdbc:mysql://mysql-238e3cd4-senseigojo192-bc48.c.aivencloud.com:10771/defaultdb?sslMode=REQUIRED
spring.datasource.username=avnadmin
spring.datasource.password=${AIVEN_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OpenAI / Groq / OpenRouter API Configuration
openai.api.key=${GROQ_API_KEY:your_default_key_here}
openai.base.url=https://api.groq.com/openai/v1/
openai.model=llama-3.1-8b-instant
openai.max.tokens=2000

# Application Configuration
app.upload.dir=uploads
app.quiz.default.questions=10
app.quiz.fallback.enabled=true

# Quiz Generation Performance Tuning
app.quiz.async.core-pool-size=4
app.quiz.async.max-pool-size=8
app.quiz.async.queue-capacity=200
app.quiz.chunk.max.chars=3000
app.quiz.chunk.overlap.chars=250
app.quiz.ai.chunk.parallelism=2
app.quiz.ai.max.retries=3
app.quiz.ai.retry.delay.ms=1200
app.quiz.ai.temperature=0.5

# Logging Configuration
logging.level.com.quizgen=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
